apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: portfolio-ai-news-agent
  annotations:
    run.googleapis.com/ingress: internal   # only reachable from Cloud Scheduler + VPC
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "1"
        run.googleapis.com/execution-environment: gen2
    spec:
      containerConcurrency: 1
      timeoutSeconds: 120
      containers:
        - image: gcr.io/PROJECT_ID/portfolio-ai-news-agent:latest
          resources:
            limits:
              memory: 512Mi
              cpu: "1"
          env:
            - name: SECRETS_SOURCE
              value: gcp
            - name: GCP_PROJECT_ID
              value: PROJECT_ID
            - name: LLM_PROVIDER
              value: claude
            - name: LOG_LEVEL
              value: INFO
          ports:
            - containerPort: 8080
